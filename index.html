<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>XNH 2DCAD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cad: {
              bg: '#0d1117',
              panel: '#161b22',
              border: '#30363d',
              text: '#c9d1d9',
              accent: '#58a6ff',
              grid: '#21262d',
            }
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    .tool-btn { position: relative; }
    .tool-btn.active { background-color: #1f6feb !important; color: #fff !important; }
    .tool-btn:hover:not(.active) { background-color: #21262d; }
    .tool-btn .kbd {
      position: absolute; bottom: 2px; right: 3px;
      font-size: 8px; color: #484f58; font-family: monospace;
      line-height: 1;
    }
    .tool-btn.active .kbd { color: #a5d6ff; }

    .layer-row { border-bottom: 1px solid #21262d; }
    .layer-row:hover { background-color: #1c2128; }
    .layer-row.active-layer { background-color: #1f2937 !important; border-left: 2px solid #58a6ff; }

    #canvas-container { cursor: crosshair; }
    #canvas-container.panning { cursor: grabbing; }
    #canvas-container.select-mode { cursor: default; }
    #canvas-container.move-mode { cursor: move; }
    #canvas-container.text-mode { cursor: text; }

    .prop-row { display: grid; grid-template-columns: 100px 1fr; gap: 4px; align-items: center; }
    .prop-label { color: #8b949e; font-size: 11px; }
    .prop-value { font-size: 11px; font-family: monospace; color: #c9d1d9; }
    .prop-input {
      background: #0d1117; border: 1px solid #30363d; border-radius: 3px;
      color: #c9d1d9; font-size: 11px; font-family: monospace;
      padding: 2px 4px; width: 100%; outline: none;
    }
    .prop-input:focus { border-color: #58a6ff; }

    .cmd-line {
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(4px);
      border: 1px solid #30363d;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    /* Snap indicator animations */
    @keyframes snapPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .snap-indicator { animation: snapPulse 0.8s ease-in-out infinite; }

    /* Command autocomplete */
    #cmd-suggestions {
      position: absolute;
      bottom: 100%;
      left: 0; right: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      max-height: 180px;
      overflow-y: auto;
      z-index: 100;
    }
    .cmd-suggestion {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      font-family: monospace;
      color: #c9d1d9;
      border-bottom: 1px solid #21262d;
    }
    .cmd-suggestion:hover, .cmd-suggestion.active { background: #1f2937; }
    .cmd-suggestion .cmd-icon { color: #58a6ff; flex-shrink: 0; }
    .cmd-suggestion .cmd-name { color: #58a6ff; font-weight: bold; min-width: 60px; }
    .cmd-suggestion .cmd-alias { color: #8b949e; font-size: 10px; min-width: 28px; }
    .cmd-suggestion .cmd-desc { color: #6e7681; font-size: 10px; }

    /* Toolbar tabs */
    .toolbar-tab {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px 4px 0 0;
      font-size: 10px; font-family: monospace;
      color: #8b949e; background: transparent;
      border: none; cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }
    .toolbar-tab:hover { color: #c9d1d9; }
    .toolbar-tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  </style>
</head>
<body class="flex flex-col h-screen font-mono text-cad-text bg-cad-bg">

  <!-- Title Bar -->
  <header class="h-10 bg-cad-panel border-b border-cad-border flex items-center justify-between px-3 shrink-0 z-20 select-none">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 bg-gradient-to-tr from-blue-700 to-cyan-400 rounded flex items-center justify-center font-bold text-white text-xs shadow">X</div>
      <span class="font-bold text-sm tracking-wide">XNH <span class="font-light text-cad-accent">2DCAD</span></span>
      <span id="file-name" class="text-xs text-gray-500 ml-2">untitled.xnh</span>
    </div>
    <div class="flex items-center gap-2">
      <!-- File ops -->
      <button id="btn-new" class="text-xs px-2 py-1 rounded border border-cad-border hover:bg-cad-grid text-gray-400 hover:text-white" title="New drawing">New</button>
      <button id="btn-save" class="text-xs px-2 py-1 rounded border border-cad-border hover:bg-cad-grid text-gray-400 hover:text-white" title="Save JSON">Save</button>
      <button id="btn-load" class="text-xs px-2 py-1 rounded border border-cad-border hover:bg-cad-grid text-gray-400 hover:text-white" title="Load JSON">Open</button>
      <input id="file-input" type="file" accept=".xnh,.json,.dxf,.dwg" class="hidden" />
      <div class="w-px h-4 bg-cad-border mx-1"></div>
      <!-- Undo/Redo -->
      <button id="btn-undo" class="p-1.5 rounded hover:bg-cad-grid text-gray-400 hover:text-white disabled:opacity-30" title="Undo (Ctrl+Z)" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button id="btn-redo" class="p-1.5 rounded hover:bg-cad-grid text-gray-400 hover:text-white disabled:opacity-30" title="Redo (Ctrl+Y)" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
      </button>
      <div class="w-px h-4 bg-cad-border mx-1"></div>
      <!-- Export -->
      <button id="btn-export-dxf" class="flex items-center gap-1.5 bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-xs font-semibold text-white transition-colors">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        Export DXF
      </button>
    </div>
  </header>

  <!-- Toolbar (Tabbed) -->
  <div class="bg-cad-panel border-b border-cad-border shrink-0 z-10">

    <!-- Tab strip -->
    <div class="flex items-center border-b border-cad-border h-7 px-2 gap-0.5">
      <button class="toolbar-tab active" data-tab="draw">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="19" x2="19" y2="5"/><circle cx="19" cy="5" r="2"/></svg>
        Draw
      </button>
      <button class="toolbar-tab" data-tab="edit">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
      <button class="toolbar-tab" data-tab="view">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        View
      </button>
      <button class="toolbar-tab" data-tab="modes">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
        Modes
      </button>
      <button class="toolbar-tab" data-tab="dim">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="20" x2="21" y2="20"/><line x1="3" y1="3" x2="3" y2="20"/><line x1="3" y1="11" x2="13" y2="11"/><polygon points="11,8 11,14 17,11"/></svg>
        Dim
      </button>
      <!-- spacer + AI input -->
      <div class="flex-1"></div>
      <form id="ai-form" class="flex items-center gap-1.5 mr-1">
        <div class="relative">
          <span id="ai-icon" class="absolute left-2 top-1/2 -translate-y-1/2 text-cad-accent">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
          </span>
          <span id="ai-loader" class="absolute left-2 top-1/2 -translate-y-1/2 text-yellow-400 hidden">
            <svg class="animate-spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
          <input type="text" id="ai-input" placeholder="AI: Describe a shape..." class="bg-cad-bg border border-cad-border rounded pl-7 pr-2 py-1 text-[10px] w-44 focus:outline-none focus:border-cad-accent text-white">
        </div>
        <button type="submit" class="bg-cad-accent text-slate-900 px-2 py-1 rounded text-[10px] font-bold hover:bg-sky-300 transition-colors">Gen</button>
      </form>
    </div>

    <!-- Tool panels (h-12 each) -->
    <div class="h-12 flex items-center px-2 gap-0.5 overflow-x-auto">

      <!-- DRAW panel -->
      <div id="tab-panel-draw" class="flex items-center gap-0.5">
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="SELECT" title="Select (Esc)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Select</span>
          <span class="kbd">Esc</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="LINE" title="Line (L)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Line</span>
          <span class="kbd">L</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="POLYLINE" title="Polyline (PL)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,19 8,10 13,16 19,5"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Pline</span>
          <span class="kbd">PL</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="RECT" title="Rectangle (REC)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="1"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Rect</span>
          <span class="kbd">REC</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="CIRCLE" title="Circle (C)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Circle</span>
          <span class="kbd">C</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="ARC" title="Arc (A) - 3 points">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20 Q4 4 20 4"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Arc</span>
          <span class="kbd">A</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="TEXT" title="Text (T)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Text</span>
          <span class="kbd">T</span>
        </button>
      </div>

      <!-- EDIT panel (hidden) -->
      <div id="tab-panel-edit" class="hidden items-center gap-0.5">
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="MOVE" title="Move (M)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3"/><path d="M3 12h18M12 3v18"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Move</span>
          <span class="kbd">M</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="COPY" title="Copy (CP)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Copy</span>
          <span class="kbd">CP</span>
        </button>
        <button id="btn-delete" class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-red-500 hover:text-red-400" title="Delete (Del)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Delete</span>
          <span class="kbd">Del</span>
        </button>
        <div class="w-px h-8 bg-cad-border mx-1"></div>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="OFFSET" title="Offset (O)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 12H3M21 5H7M17 19H3"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Offset</span>
          <span class="kbd">O</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="TRIM" title="Trim (TR)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><path d="M12 5l-7 7 7 7"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Trim</span>
          <span class="kbd">TR</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="EXTEND" title="Extend (EX)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><path d="M12 5l7 7-7 7"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Extend</span>
          <span class="kbd">EX</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="FILLET" title="Fillet (F)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21 L3 10 Q3 3 10 3 L21 3"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Fillet</span>
          <span class="kbd">F</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="STRETCH" title="Stretch (S)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5,12 10,7 10,17"/><line x1="10" y1="12" x2="19" y2="12"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Stretch</span>
          <span class="kbd">S</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="ARRAY" title="Array (AR)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="6" height="6"/><rect x="15" y="3" width="6" height="6"/><rect x="3" y="15" width="6" height="6"/><rect x="15" y="15" width="6" height="6"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Array</span>
          <span class="kbd">AR</span>
        </button>
        <button class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="HATCH" title="Hatch (H)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Hatch</span>
          <span class="kbd">H</span>
        </button>
      </div>

      <!-- VIEW panel (hidden) -->
      <div id="tab-panel-view" class="hidden items-center gap-0.5">
        <button id="btn-zoom-extents" class="tool-btn w-14 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" title="Zoom Extents (Z E)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Extents</span>
          <span class="kbd">Z E</span>
        </button>
      </div>

      <!-- DIM panel (hidden) -->
      <div id="tab-panel-dim" class="hidden items-center gap-0.5">
        <button class="tool-btn w-14 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="DIMLINEAR" title="Linear Dimension (DLI)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="20" x2="21" y2="20"/>
            <line x1="3" y1="4" x2="3" y2="20"/>
            <line x1="21" y1="4" x2="21" y2="20"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <polygon points="6,12 3,9 3,15" fill="currentColor" stroke="none"/>
            <polygon points="18,12 21,9 21,15" fill="currentColor" stroke="none"/>
          </svg>
          <span class="text-[8px] uppercase tracking-wider">Linear</span>
          <span class="kbd">DLI</span>
        </button>
        <button class="tool-btn w-14 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="DIMALIGNED" title="Aligned Dimension (DAL)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" y1="20" x2="20" y2="4"/>
            <line x1="4" y1="4" x2="10" y2="4"/>
            <line x1="14" y1="20" x2="20" y2="20"/>
            <line x1="7" y1="17" x2="17" y2="7"/>
          </svg>
          <span class="text-[8px] uppercase tracking-wider">Aligned</span>
          <span class="kbd">DAL</span>
        </button>
        <button class="tool-btn w-14 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="DIMRADIUS" title="Radius Dimension (DRA)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="8"/>
            <line x1="12" y1="12" x2="19" y2="6"/>
            <polygon points="19,6 16,7 18,9" fill="currentColor" stroke="none"/>
          </svg>
          <span class="text-[8px] uppercase tracking-wider">Radius</span>
          <span class="kbd">DRA</span>
        </button>
        <button class="tool-btn w-14 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" data-tool="DIMDIAMETER" title="Diameter Dimension (DDI)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="8"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <polygon points="4,12 7,10 7,14" fill="currentColor" stroke="none"/>
            <polygon points="20,12 17,10 17,14" fill="currentColor" stroke="none"/>
          </svg>
          <span class="text-[8px] uppercase tracking-wider">Diam</span>
          <span class="kbd">DDI</span>
        </button>
      </div>

      <!-- MODES panel (hidden) -->
      <div id="tab-panel-modes" class="hidden items-center gap-0.5">
        <button id="btn-ortho" class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400" title="Ortho Mode (F8)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="21" y2="3"/><line x1="3" y1="3" x2="3" y2="21"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Ortho</span>
          <span class="kbd">F8</span>
        </button>
        <button id="btn-snap" class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400 active" title="Object Snap (F3)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Snap</span>
          <span class="kbd">F3</span>
        </button>
        <button id="btn-grid" class="tool-btn w-12 h-10 rounded flex flex-col items-center justify-center gap-0.5 text-xs text-gray-400 active" title="Grid Display">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span class="text-[8px] uppercase tracking-wider">Grid</span>
        </button>
      </div>

    </div>
  </div>

  <!-- Main Workspace -->
  <div class="flex flex-1 overflow-hidden relative">

    <!-- Canvas Area -->
    <div id="canvas-container" class="flex-1 bg-[#0b1120] relative overflow-hidden select-mode">

      <!-- SVG Canvas -->
      <svg id="cad-svg" class="w-full h-full block" tabindex="0" style="outline:none">
        <defs>
          <pattern id="grid-pattern-small" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="translate(0,0) scale(1,1)">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1c2128" stroke-width="0.5"/>
          </pattern>
          <pattern id="grid-pattern-large" width="100" height="100" patternUnits="userSpaceOnUse" patternTransform="translate(0,0) scale(1,1)">
            <rect width="100" height="100" fill="url(#grid-pattern-small)"/>
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#21262d" stroke-width="1"/>
          </pattern>
        </defs>

        <!-- Grid -->
        <g id="grid-layer">
          <rect id="grid-rect" width="100%" height="100%" fill="url(#grid-pattern-large)"/>
        </g>

        <!-- Viewport transform group -->
        <g id="viewport">
          <!-- World origin axes -->
          <g id="origin-layer">
            <line x1="-5" y1="0" x2="80" y2="0" stroke="#f87171" stroke-width="0.5" opacity="0.6"/>
            <line x1="0" y1="-5" x2="0" y2="80" stroke="#4ade80" stroke-width="0.5" opacity="0.6"/>
            <circle cx="0" cy="0" r="2" fill="#f87171" opacity="0.6"/>
          </g>

          <!-- Entities -->
          <g id="entities-layer"></g>

          <!-- Preview (current drawing operation) -->
          <g id="preview-layer" opacity="0.75" pointer-events="none"></g>

          <!-- Snap indicator -->
          <g id="snap-layer" pointer-events="none"></g>
        </g>

        <!-- Selection box (in screen coords, outside viewport transform) -->
        <g id="selection-box-layer" pointer-events="none"></g>
      </svg>

      <!-- Command Line -->
      <div class="cmd-line absolute bottom-3 left-3 w-80 flex flex-col" style="max-height: 120px;">
        <div id="cmd-history" class="flex-1 overflow-y-auto px-2 pt-2 text-xs text-gray-400 font-mono space-y-0.5" style="max-height: 80px;">
          <div class="text-cad-accent">XNH 2DCAD ready. Type a command or select a tool.</div>
        </div>
        <div class="relative flex items-center gap-1.5 border-t border-cad-border px-2 py-1.5">
          <span class="text-cad-accent text-xs font-bold shrink-0">CMD&gt;</span>
          <input id="cmd-input" class="bg-transparent flex-1 text-xs text-white font-mono focus:outline-none" placeholder="Command..." autocomplete="off" spellcheck="false">
          <div id="cmd-suggestions" class="hidden"></div>
        </div>
      </div>

      <!-- Text Input Overlay (for TEXT tool) -->
      <div id="text-input-overlay" class="hidden absolute bg-cad-panel border border-cad-accent rounded p-2 shadow-xl z-50" style="min-width:200px">
        <div class="text-xs text-gray-400 mb-1">Enter text:</div>
        <input id="text-content-input" type="text" class="bg-cad-bg border border-cad-border rounded px-2 py-1 text-sm text-white font-mono w-full focus:outline-none focus:border-cad-accent" placeholder="Text...">
        <div class="flex gap-2 mt-2">
          <button id="text-ok" class="flex-1 bg-cad-accent text-slate-900 text-xs py-1 rounded font-bold">OK</button>
          <button id="text-cancel" class="flex-1 bg-cad-grid text-gray-300 text-xs py-1 rounded">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div class="w-64 bg-cad-panel border-l border-cad-border flex flex-col z-20 shrink-0">

      <!-- Layers Panel -->
      <div class="flex flex-col" style="height: 50%;">
        <div class="px-3 py-2 bg-cad-bg border-b border-cad-border flex items-center justify-between shrink-0">
          <span class="text-xs font-bold uppercase tracking-wider flex items-center gap-1.5 text-gray-300">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            Layers
          </span>
          <button id="btn-new-layer" class="text-[10px] bg-cad-grid hover:bg-cad-border px-2 py-0.5 rounded border border-cad-border text-gray-300">+ New</button>
        </div>
        <div id="layers-list" class="flex-1 overflow-y-auto"></div>
      </div>

      <!-- Properties Panel -->
      <div class="flex flex-col border-t border-cad-border" style="height: 50%;">
        <div class="px-3 py-2 bg-cad-bg border-b border-cad-border shrink-0">
          <span class="text-xs font-bold uppercase tracking-wider flex items-center gap-1.5 text-gray-300">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
            Properties
          </span>
        </div>
        <div id="properties-panel" class="flex-1 overflow-y-auto p-3 text-xs space-y-2">
          <div class="text-gray-500 italic text-center mt-6">No selection</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="h-6 bg-cad-bg border-t border-cad-border flex items-center px-3 justify-between text-[10px] text-gray-500 font-mono shrink-0">
    <div class="flex gap-4">
      <span id="status-tool" class="text-cad-accent">SELECT</span>
      <span id="status-coords">X: 0.000  Y: 0.000</span>
      <span id="status-items">0 items</span>
      <span id="status-selected" class="hidden text-yellow-400">0 selected</span>
    </div>
    <div class="flex gap-3">
      <span id="status-ortho" class="text-gray-600 cursor-pointer hover:text-gray-400" title="Toggle Ortho (F8)">ORTHO:OFF</span>
      <span id="status-snap" class="text-cad-accent cursor-pointer hover:text-white" title="Toggle Snap (F3)">SNAP:ON</span>
      <span id="status-zoom">100%</span>
    </div>
  </div>

  <!-- Layer Color Picker Dialog -->
  <div id="color-picker-dialog" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-cad-panel border border-cad-border rounded-lg p-4 shadow-2xl" style="min-width:280px">
      <div class="text-sm font-bold mb-3">Layer Color</div>
      <div id="color-swatches" class="grid grid-cols-8 gap-2 mb-3"></div>
      <div class="flex items-center gap-2 mb-3">
        <label class="text-xs text-gray-400">Custom:</label>
        <input type="color" id="custom-color-input" class="w-8 h-7 rounded border border-cad-border cursor-pointer">
        <span id="custom-color-hex" class="text-xs font-mono text-gray-300">#ffffff</span>
      </div>
      <div class="flex gap-2">
        <button id="color-ok" class="flex-1 bg-cad-accent text-slate-900 py-1.5 rounded text-xs font-bold">OK</button>
        <button id="color-cancel" class="flex-1 bg-cad-grid text-gray-300 py-1.5 rounded text-xs">Cancel</button>
      </div>
    </div>
  </div>

  <!-- App Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
